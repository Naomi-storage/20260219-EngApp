<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Flashcard Master - Ultra</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --note-color: #636e72;
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 95%;
            max-width: 450px;
            height: 90vh;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 18px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #ecf0f1;
            padding: 8px;
            font-size: 0.85rem;
            border-bottom: 1px solid #ddd;
        }

        #game-screen {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 25px;
            justify-content: space-between;
            align-items: center;
        }

        .question-card {
            width: 100%;
            flex-grow: 1;
            margin-bottom: 20px;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow-y: auto; /* 長い解説が入った時用 */
        }

        .question-card:active {
            transform: scale(0.98);
            background: #fdfdfd;
        }

        #japanese-text {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        #english-text {
            color: var(--accent-color);
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1.4;
            display: none;
            word-wrap: break-word;
        }

        /* 解説用のスタイルを新規追加 */
        #note-text {
            display: none;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #dfe6e9;
            font-size: 0.9rem;
            color: var(--note-color);
            text-align: left;
            width: 100%;
            line-height: 1.5;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        #note-text strong {
            color: #2d3436;
        }

        .controls {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.8; }
        .btn-correct { background-color: var(--success-color); }
        .btn-wrong { background-color: var(--error-color); }
        .btn-finish { background-color: #bdc3c7; grid-column: span 2; margin-top: 5px; color: #2c3e50; }

        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-color);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
        }

        .category-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .category-btn:hover { background: rgba(255,255,255,0.2); }

        #result-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            z-index: 110;
        }

        .result-score { font-size: 4rem; color: var(--accent-color); font-weight: 800; margin: 10px 0; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="start-overlay">
        <h1 style="margin-bottom: 5px; font-size: 1.5rem;">English Learning Master</h1>
        <p style="opacity: 0.8; margin-bottom: 20px; font-size: 0.9rem;">中級〜上級実戦フレーズ</p>
        
        <div class="category-grid">
            <button class="category-btn" onclick="startGame('business')">💼 ビジネス (交渉・戦略)</button>
            <button class="category-btn" onclick="startGame('meeting')">🌐 Web会議 (進行・議論)</button>
            <button class="category-btn" onclick="startGame('daily')">🏠 日常生活 (状況説明・感情)</button>
            <button class="category-btn" onclick="startGame('news')">📈 時事ニュース (社会・経済)</button>
        </div>
    </div>

    <header id="current-category-name">English Master</header>
    
    <div class="stats-bar">
        <span>残り: <span id="stat-remaining">0</span></span>
        <span>正解数: <span id="stat-correct">0</span></span>
    </div>

    <div id="game-screen">
        <div class="question-card" id="card" onclick="showAnswer()">
            <div id="japanese-text">読み込み中...</div>
            <div id="english-text"></div>
            <!-- 解説表示用の要素を追加 -->
            <div id="note-text"></div>
        </div>

        <div class="controls" id="game-controls" style="visibility: hidden;">
            <button class="btn btn-correct" onclick="handleResult(true)">覚えた</button>
            <button class="btn btn-wrong" onclick="handleResult(false)">また出す</button>
            <button class="btn btn-finish" onclick="finishGame()">終了</button>
        </div>
    </div>

    <div id="result-screen">
        <h2>Performance</h2>
        <div class="result-score" id="final-rate">0%</div>
        <p id="final-stats" style="color: #7f8c8d;"></p>
        <p id="feedback-msg" style="font-weight: bold; margin-top: 15px;"></p>
        <button class="btn" style="background: var(--primary-color); width: 100%; margin-top: 30px;" onclick="location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
    // データ群に語彙の解説(note)を追加
    const questionBank = {
        business: [
            { jp: "お忙しいところ恐縮ですが、進捗を伺えますか？", en: "I'm sorry to bother you, but could you give me an update on the progress?", note: "<strong>bother:</strong> 邪魔をする、手を煩わせる<br><strong>give me an update on ~:</strong> ～の最新状況を教える" },
            { jp: "その件につきましては、改めて検討させてください。", en: "Please let me take that under advisement and get back to you.", note: "<strong>take ~ under advisement:</strong> ～を慎重に検討する<br><strong>get back to you:</strong> 後ほど折り返し連絡する" },
            { jp: "ご期待に沿えず、大変心苦しく思っております。", en: "We deeply regret that we were unable to meet your expectations.", note: "<strong>deeply regret:</strong> 深く後悔する、遺憾に思う<br><strong>meet one's expectations:</strong> 期待に応える" },
            { jp: "早急にこの問題に対処する必要があります。", en: "We need to address this issue as a matter of urgency.", note: "<strong>address an issue:</strong> 問題に対処する<br><strong>as a matter of urgency:</strong> 喫緊の課題として、早急に" },
            { jp: "コスト削減と品質維持のバランスを取る必要があります。", en: "We need to strike a balance between cost reduction and maintaining quality.", note: "<strong>strike a balance between A and B:</strong> AとBのバランスを取る" },
            { jp: "この提案のメリットとデメリットを比較検討しましょう。", en: "Let's weigh the pros and cons of this proposal.", note: "<strong>weigh:</strong> （比較・検討のために）秤にかける<br><strong>pros and cons:</strong> 賛否、メリットとデメリット" },
            { jp: "不測の事態に備えて、代替案を用意しておくべきです。", en: "We should have a contingency plan in case of unforeseen circumstances.", note: "<strong>contingency plan:</strong> 不測の事態に対する計画、代替案<br><strong>unforeseen:</strong> 予期せぬ" },
            { jp: "彼の提案は非常に説得力があり、検討に値します。", en: "His proposal is very compelling and worth considering.", note: "<strong>compelling:</strong> 説得力のある、人を引きつける<br><strong>worth ~ing:</strong> ～する価値がある" },
            { jp: "市場の動向を注視し、戦略を柔軟に変更しましょう。", en: "Let's keep a close eye on market trends and pivot our strategy flexibly.", note: "<strong>keep a close eye on:</strong> ～を注視する<br><strong>pivot:</strong> （軸足を残しつつ）方向転換する" },
            { jp: "このプロジェクトの成功は、チーム全体の協力にかかっています。", en: "The success of this project hinges on the cooperation of the entire team.", note: "<strong>hinge on ~:</strong> ～にかかっている、～次第である（ドアの蝶番=hingeが語源）" },
            { jp: "期待以上の成果を上げるために、全力を尽くします。", en: "I will do my utmost to exceed your expectations.", note: "<strong>do one's utmost:</strong> 全力を尽くす<br><strong>exceed:</strong> 上回る、超える" },
            { jp: "御社のニーズに合わせて、サービスをカスタマイズ可能です。", en: "We can tailor our services to meet your specific needs.", note: "<strong>tailor:</strong> （服を仕立てるように）調整する、カスタマイズする" },
            { jp: "現時点では、詳細を明らかにすることは控えさせていただきます。", en: "At this point, I would like to refrain from disclosing the details.", note: "<strong>refrain from ~ing:</strong> ～するのを控える<br><strong>disclose:</strong> 開示する、明らかにする" },
            { jp: "契約の条件について、いくつかの修正を提案させてください。", en: "Allow me to propose some amendments to the terms of the contract.", note: "<strong>amendment:</strong> 修正、改正<br><strong>terms:</strong> （契約などの）条件" },
            { jp: "競合他社に差をつけるための独自の強みが必要です。", en: "We need a unique value proposition to differentiate ourselves from competitors.", note: "<strong>value proposition:</strong> 価値提案（他社にはない独自の強み）<br><strong>differentiate:</strong> 差別化する" },
            { jp: "予算の制約があるため、優先順位を決定しなければなりません。", en: "Due to budget constraints, we must determine our priorities.", note: "<strong>constraint:</strong> 制約、制限<br><strong>determine:</strong> 決定する" },
            { jp: "プロジェクトの遅延を取り戻すために、リソースを追加投入します。", en: "We will allocate additional resources to make up for the project delay.", note: "<strong>allocate:</strong> 割り当てる、配分する<br><strong>make up for:</strong> ～を埋め合わせる、取り戻す" },
            { jp: "この件に関しては、私の裁量で決定させていただきます。", en: "I will make a decision on this matter at my discretion.", note: "<strong>at one's discretion:</strong> ～の裁量で、独自の判断で" },
            { jp: "相互理解を深めるために、直接お話ししたいと考えています。", en: "I'd like to talk in person to foster a better mutual understanding.", note: "<strong>in person:</strong> 直接会って<br><strong>foster:</strong> 育む、促進する" },
            { jp: "まずは共通の目標を確認することから始めましょう。", en: "Let's start by establishing our common ground.", note: "<strong>establish:</strong> 確立する<br><strong>common ground:</strong> 共通の基盤、共通の立場・見解" },
            { jp: "その価格設定は、現在の市場価値に見合っていないと感じます。", en: "I feel that the pricing is not commensurate with the current market value.", note: "<strong>pricing:</strong> 価格設定<br><strong>commensurate with ~:</strong> ～に相応した、見合った" },
            { jp: "長期的な視点に立って、このパートナーシップを構築したいです。", en: "I want to build this partnership from a long-term perspective.", note: "<strong>from a long-term perspective:</strong> 長期的な視点から" },
            { jp: "前向きにご検討いただければ幸いです。", en: "I would appreciate it if you could give this your favorable consideration.", note: "<strong>I would appreciate it if ~:</strong> ～していただけるとありがたい<br><strong>favorable:</strong> 好意的な、前向きな" },
            { jp: "結論を出す前に、リスク要因を徹底的に分析しましょう。", en: "Let's conduct a thorough analysis of the risk factors before reaching a conclusion.", note: "<strong>conduct an analysis:</strong> 分析を行う<br><strong>thorough:</strong> 徹底的な" },
            { jp: "本日は貴重なお時間をいただき、ありがとうございました。", en: "Thank you very much for taking the time to meet with us today.", note: "<strong>take the time to ~:</strong> わざわざ時間を割いて～する" }
        ],
        meeting: [
            { jp: "画面が共有されているか確認いただけますか？", en: "Could you confirm if my screen is being shared correctly?", note: "<strong>is being shared:</strong> 共有されている（受動態の進行形）" },
            { jp: "恐れ入りますが、少しお声が遠いようです。", en: "I'm afraid your voice is a bit faint. Could you speak up?", note: "<strong>faint:</strong> (音などが)かすかな、遠い<br><strong>speak up:</strong> 大きな声で話す" },
            { jp: "今の発言について、もう少し詳しく説明していただけますか？", en: "Could you elaborate on what you just said?", note: "<strong>elaborate on ~:</strong> ～について詳しく説明する" },
            { jp: "時間が限られているので、次の議題に移りましょう。", en: "Since our time is limited, let's move on to the next item on the agenda.", note: "<strong>move on to ~:</strong> ～に移る<br><strong>agenda:</strong> 議題、アジェンダ" },
            { jp: "本日の議論の要点をまとめさせていただきます。", en: "Let me summarize the key points of our discussion today.", note: "<strong>summarize:</strong> 要約する<br><strong>key points:</strong> 要点" },
            { jp: "今のところ、皆さんの意見は一致しているようですね。", en: "It seems that we are all on the same page for now.", note: "<strong>on the same page:</strong> 同じページを見ている＝認識が一致している" },
            { jp: "これまでの話を整理するために、一度確認させてください。", en: "Let me double-check to make sure I've got everything straight so far.", note: "<strong>get everything straight:</strong> 状況などを整理する・正しく理解する" },
            { jp: "電波の状況が悪く、先ほどの内容が聞き取れませんでした。", en: "The connection was poor, and I couldn't catch what you just said.", note: "<strong>connection:</strong> 通信状況、電波<br><strong>catch:</strong> （言葉などを）聞き取る" },
            { jp: "後ほど、議事録と関連資料をメールで送付いたします。", en: "I will send the meeting minutes and relevant documents via email later.", note: "<strong>meeting minutes:</strong> 議事録<br><strong>relevant:</strong> 関連する" },
            { jp: "質問や懸念事項があれば、遠慮なくおっしゃってください。", en: "Please feel free to voice any questions or concerns you may have.", note: "<strong>feel free to ~:</strong> 遠慮なく～する<br><strong>voice:</strong> (意見などを)言葉に表す" },
            { jp: "どなたか、この点について補足はありますか？", en: "Does anyone have anything to add regarding this point?", note: "<strong>add:</strong> 付け加える<br><strong>regarding ~:</strong> ～に関して" },
            { jp: "このプロジェクトのタイムラインを再確認しましょう。", en: "Let's revisit the timeline for this project.", note: "<strong>revisit:</strong> （一度議論したことを）再検討する、再び話し合う" },
            { jp: "あなたの意見は理解できますが、別の視点も考慮すべきです。", en: "I see your point, but we should also consider another perspective.", note: "<strong>see your point:</strong> 言い分を理解する<br><strong>perspective:</strong> 視点" },
            { jp: "具体的な数値データに基づいて議論を進めましょう。", en: "Let's proceed with the discussion based on specific numerical data.", note: "<strong>proceed with:</strong> ～を進める<br><strong>numerical:</strong> 数値の" },
            { jp: "一旦この議論を保留にして、次に進んでもよろしいでしょうか？", en: "Would you mind if we put this discussion on hold and move forward?", note: "<strong>put ~ on hold:</strong> ～を保留にする<br><strong>move forward:</strong> 前に進む" },
            { jp: "次回の会議までに、各自の役割を明確にしておきましょう。", en: "Let's clarify our respective roles by the next meeting.", note: "<strong>clarify:</strong> 明確にする<br><strong>respective:</strong> それぞれの" },
            { jp: "技術的なトラブルで開始が遅れたことをお詫びします。", en: "I apologize for the delay due to technical difficulties.", note: "<strong>apologize for ~:</strong> ～を謝罪する<br><strong>technical difficulties:</strong> 技術的な問題" },
            { jp: "その質問については、担当部署に確認した上で回答いたします。", en: "I will get back to you on that question after consulting with the relevant department.", note: "<strong>get back to you:</strong> （後で）返事をする<br><strong>consult with:</strong> ～に相談する" },
            { jp: "皆さんの建設的な意見に感謝いたします。", en: "I appreciate all of your constructive feedback.", note: "<strong>constructive:</strong> 建設的な<br><strong>feedback:</strong> 意見、反応" },
            { jp: "今日は非常に有意義な議論ができたと思います。", en: "I believe we had a very productive discussion today.", note: "<strong>productive:</strong> 生産的な、有意義な" },
            { jp: "発言される際は、マイクのミュートを解除してください。", en: "Please unmute your microphone when you wish to speak.", note: "<strong>unmute:</strong> ミュートを解除する" },
            { jp: "挙手機能を使って質問をしていただけますか？", en: "Could you use the 'raise hand' feature to ask a question?", note: "<strong>feature:</strong> 機能" },
            { jp: "議論が本筋から逸れているようです。戻しましょう。", en: "It seems we're getting off track. Let's get back to the main point.", note: "<strong>get off track:</strong> 話が脱線する、本筋から逸れる" },
            { jp: "最終決定を下す前に、現場の意見を聞く必要があります。", en: "We need to hear from the frontline staff before making a final decision.", note: "<strong>frontline:</strong> 現場の、最前線の" },
            { jp: "本日の会議はこれにて終了とさせていただきます。", en: "I'd like to wrap up today's meeting now.", note: "<strong>wrap up:</strong> 締めくくる、終わりにする" }
        ],
        daily: [
            { jp: "この路線のラッシュアワーは非常に混雑し、しばしば遅延が発生します。", en: "The rush hour on this line is extremely crowded, and delays occur frequently.", note: "<strong>extremely:</strong> 極めて<br><strong>frequently:</strong> 頻繁に" },
            { jp: "最近、仕事とプライベートの両立に苦労しています。", en: "I've been struggling to maintain a work-life balance lately.", note: "<strong>struggle to ~:</strong> ～するのに苦労する、もがく" },
            { jp: "彼の冗談はいつも少し皮肉が効いていて、好みが分かれます。", en: "His jokes are always a bit sarcastic, so they're not for everyone.", note: "<strong>sarcastic:</strong> 皮肉な<br><strong>not for everyone:</strong> 万人受けするわけではない" },
            { jp: "この小説の結末は、私の予想を完全に裏切るものでした。", en: "The ending of this novel completely defied my expectations.", note: "<strong>defy expectations:</strong> 予想を裏切る、期待に反する" },
            { jp: "環境への影響を考えて、プラスチックの使用を控えています。", en: "I'm cutting down on plastic use to reduce my environmental impact.", note: "<strong>cut down on ~:</strong> ～を減らす、控える" },
            { jp: "彼女のプレゼンテーションは、聴衆を惹きつける魅力がありました。", en: "Her presentation had the power to captivate the audience.", note: "<strong>captivate:</strong> 魅了する、心を奪う" },
            { jp: "慣れない土地での生活は、最初は戸惑うことも多かったです。", en: "Living in an unfamiliar place was quite overwhelming at first.", note: "<strong>unfamiliar:</strong> 慣れない、よく知らない<br><strong>overwhelming:</strong> 圧倒されるような、戸惑う" },
            { jp: "健康維持のために、毎朝のジョギングを習慣にしています。", en: "I make it a rule to go jogging every morning to stay in shape.", note: "<strong>make it a rule to ~:</strong> ～することにしている（習慣）<br><strong>stay in shape:</strong> 健康（体型）を保つ" },

    const categoryNames = {
        business: "💼 ビジネス (交渉・戦略)",
        meeting: "🌐 Web会議 (進行・議論)",
        daily: "🏠 日常生活 (状況・感情)",
        news: "📈 時事ニュース (社会・経済)"
    };

    let currentQueue = [];
    let currentQuestion = null;
    let totalAttempts = 0;
    let correctCount = 0;
    let audioEnabled = false;

    const japaneseEl = document.getElementById('japanese-text');
    const englishEl = document.getElementById('english-text');
    const noteEl = document.getElementById('note-text'); // 追加
    const controlsEl = document.getElementById('game-controls');
    const statRem = document.getElementById('stat-remaining');
    const statCor = document.getElementById('stat-correct');
    const categoryHeader = document.getElementById('current-category-name');

    const synth = window.speechSynthesis;

    function startGame(category) {
        document.getElementById('start-overlay').style.display = 'none';
        categoryHeader.innerText = categoryNames[category];
        audioEnabled = true;
        
        // 問題を完全にシャッフルしてキューを作成
        currentQueue = [...questionBank[category]].sort(() => Math.random() - 0.5);
        
        totalAttempts = 0;
        correctCount = 0;
        nextQuestion();
    }

    function nextQuestion() {
        if (currentQueue.length === 0) {
            finishGame();
            return;
        }

        currentQuestion = currentQueue[0];
        japaneseEl.innerText = currentQuestion.jp;
        englishEl.innerText = currentQuestion.en;
        
        // 裏面（英語・解説）を非表示にしてリセット
        englishEl.style.display = 'none';
        noteEl.style.display = 'none';
        controlsEl.style.visibility = 'hidden';
        
        updateStats();
    }

    function showAnswer() {
        // すでに表示されている場合は処理しない
        if (!currentQuestion || englishEl.style.display === 'block') return;
        
        // 英語と解説を表示
        englishEl.style.display = 'block';
        if (currentQuestion.note) {
            noteEl.innerHTML = currentQuestion.note;
            noteEl.style.display = 'block';
        }
        
        controlsEl.style.visibility = 'visible';
        
        // 音声読み上げ
        if (audioEnabled) {
            const utter = new SpeechSynthesisUtterance(currentQuestion.en);
            utter.lang = 'en-US';
            utter.rate = 0.9;
            synth.cancel();
            synth.speak(utter);
        }
    }

    function handleResult(isCorrect) {
        totalAttempts++;
        if (isCorrect) {
            correctCount++;
            currentQueue.shift();
        } else {
            // 間違えた場合は最後尾に回して再出題
            const wrongItem = currentQueue.shift();
            currentQueue.push(wrongItem);
        }
        nextQuestion();
    }

    function updateStats() {
        statRem.innerText = currentQueue.length;
        statCor.innerText = correctCount;
    }

    function finishGame() {
        const resultScreen = document.getElementById('result-screen');
        const finalRate = document.getElementById('final-rate');
        const finalStats = document.getElementById('final-stats');
        const feedback = document.getElementById('feedback-msg');

        resultScreen.style.display = 'flex';
        
        const rate = totalAttempts === 0 ? 0 : Math.round((correctCount / totalAttempts) * 100);
        finalRate.innerText = rate + "%";
        finalStats.innerText = `試行回数: ${totalAttempts} / 正解: ${correctCount}`;

        if (rate >= 90) feedback.innerText = "驚異的なマスター率です！実戦でも自信を持って使えます。";
        else if (rate >= 75) feedback.innerText = "素晴らしい！中級の壁を突破しつつあります。";
        else feedback.innerText = "手応えのあるフレーズばかりです。繰り返し挑戦しましょう！";
    }
</script>
